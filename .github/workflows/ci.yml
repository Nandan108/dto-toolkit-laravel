name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4, 8.5]
        include:
          - php: 8.2
            run-cs-fixer: true
            run-psalm: true

    name: PHP ${{ matrix.php }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer, psalm
          extensions: xdebug, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --with-all-dependencies

      - name: Run PHP-CS-Fixer (dry run)
        if: matrix.run-cs-fixer == 'true'
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --verbose --allow-risky=yes

      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true

      - name: Run Psalm
        if: matrix.run-psalm == 'true'
        run: vendor/bin/psalm --no-cache --no-progress
